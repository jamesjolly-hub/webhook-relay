name               = "webhook-relay"
main               = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding  = "RELAY_STORE"
id       = "bc558d58235248ef85be5dba4d84c155"
preview_id = "b960838db5724c5797c4708116303376"

[[durable_objects.bindings]]
name       = "RELAY_DO"
class_name = "RelayDO"

[[migrations]]
tag             = "v1"
new_sqlite_classes = ["RelayDO"]

[vars]
BIN_TTL_SECONDS   = "604800"    # 7 days default TTL for captured events
MAX_EVENTS_PER_BIN = "500"
